<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GameApp — Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --royal-darkest: #0d1547;
            --royal-dark:    #1a237e;
            --royal-mid:     #283593;
            --royal-base:    #3949ab;
            --royal-light:   #5c6bc0;
            --royal-pale:    #9fa8da;
            --royal-bg:      #e8eaf6;
            --royal-surface: #f3f4fd;
            --gold:          #ffd700;
            --white:         #ffffff;
            --danger:        #c62828;
            --danger-light:  #ffebee;
            --shadow:        0 20px 60px rgba(26,35,126,0.35);
            --radius:        16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--royal-darkest) 0%, var(--royal-dark) 40%, var(--royal-base) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(92,107,192,0.2) 0%, transparent 70%);
            top: -150px; right: -100px;
            border-radius: 50%;
            animation: float 9s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
            bottom: -80px; left: -80px;
            border-radius: 50%;
            animation: float 11s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 520px;
            padding: 44px 40px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, var(--royal-dark), var(--royal-base));
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(26,35,126,0.4);
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--royal-dark), var(--royal-base));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo p { color: #6b7280; font-size: 14px; margin-top: 4px; }

        .alert-error {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            background: var(--danger-light);
            color: var(--danger);
            border-left: 4px solid var(--danger);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--royal-mid);
            margin-bottom: 7px;
            letter-spacing: 0.3px;
        }

        .optional-tag {
            font-size: 11px;
            font-weight: 400;
            color: #9ca3af;
            margin-left: 4px;
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
        }

        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 2px solid #e0e3f5;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #1f2937;
            background: var(--royal-surface);
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--royal-base);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(57,73,171,0.12);
        }

        .password-hint {
            font-size: 11.5px;
            color: #9ca3af;
            margin-top: 5px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--royal-dark) 0%, var(--royal-base) 100%);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 20px rgba(26,35,126,0.35);
            margin-top: 8px;
            letter-spacing: 0.4px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(26,35,126,0.45);
        }

        .divider {
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
            margin: 22px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%; width: 40%;
            height: 1px;
            background: #e5e7eb;
        }
        .divider::before { left: 0; }
        .divider::after  { right: 0; }

        .link-text {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }
        .link-text a {
            color: var(--royal-base);
            font-weight: 600;
            text-decoration: none;
        }
        .link-text a:hover { color: var(--royal-dark); }

        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
            .card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">🎮</div>
        <h1>Create Account</h1>
        <p>Join GameApp and start playing!</p>
    </div>

    <div th:if="${error}" class="alert-error">
        ⚠️ <span th:text="${error}"></span>
    </div>

    <form th:action="@{/register}" method="post">
        <div class="form-row">
            <div class="form-group">
                <label for="firstName">First Name <span class="optional-tag">(optional)</span></label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" id="firstName" name="firstName"
                           th:value="${firstName}"
                           placeholder="John"/>
                </div>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name <span class="optional-tag">(optional)</span></label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" id="lastName" name="lastName"
                           th:value="${lastName}"
                           placeholder="Doe"/>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="username">Username <span style="color:#c62828">*</span></label>
            <div class="input-wrap">
                <span class="input-icon">🏷️</span>
                <input type="text" id="username" name="username"
                       th:value="${username}"
                       placeholder="e.g. johndoe123" required
                       minlength="3" maxlength="50"
                       autocomplete="username"/>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Address <span style="color:#c62828">*</span></label>
            <div class="input-wrap">
                <span class="input-icon">📧</span>
                <input type="email" id="email" name="email"
                       th:value="${email}"
                       placeholder="john@example.com" required
                       autocomplete="email"/>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="password">Password <span style="color:#c62828">*</span></label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password"
                           placeholder="Min. 6 characters" required
                           minlength="6"
                           autocomplete="new-password"/>
                </div>
                <div class="password-hint">At least 6 characters</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password <span style="color:#c62828">*</span></label>
                <div class="input-wrap">
                    <span class="input-icon">🔐</span>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="Repeat password" required
                           autocomplete="new-password"/>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-primary">Create Account 🚀</button>
    </form>

    <div class="divider">or</div>

    <div class="link-text">
        Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>
</div>
</body>
</html>
