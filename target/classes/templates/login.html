<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GameApp — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --royal-darkest: #0d1547;
            --royal-dark:    #1a237e;
            --royal-mid:     #283593;
            --royal-base:    #3949ab;
            --royal-light:   #5c6bc0;
            --royal-pale:    #9fa8da;
            --royal-bg:      #e8eaf6;
            --royal-surface: #f3f4fd;
            --gold:          #ffd700;
            --gold-soft:     #f9a825;
            --white:         #ffffff;
            --danger:        #c62828;
            --success:       #1b5e20;
            --success-light: #e8f5e9;
            --danger-light:  #ffebee;
            --shadow:        0 20px 60px rgba(26,35,126,0.35);
            --radius:        16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--royal-darkest) 0%, var(--royal-dark) 40%, var(--royal-base) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background circles */
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(92,107,192,0.25) 0%, transparent 70%);
            top: -200px; left: -150px;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            border-radius: 50%;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--royal-dark), var(--royal-base));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(26,35,126,0.4);
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--royal-dark), var(--royal-base));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-error {
            background: var(--danger-light);
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }
        .alert-success {
            background: var(--success-light);
            color: var(--success);
            border-left: 4px solid #4caf50;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--royal-mid);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            pointer-events: none;
        }

        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 13px 16px 13px 44px;
            border: 2px solid #e0e3f5;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #1f2937;
            background: var(--royal-surface);
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--royal-base);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(57,73,171,0.12);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--royal-dark) 0%, var(--royal-base) 100%);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 20px rgba(26,35,126,0.35);
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(26,35,126,0.45);
            background: linear-gradient(135deg, var(--royal-mid) 0%, var(--royal-light) 100%);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
            margin: 24px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%; width: 40%;
            height: 1px;
            background: #e5e7eb;
        }
        .divider::before { left: 0; }
        .divider::after  { right: 0; }

        .link-text {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .link-text a {
            color: var(--royal-base);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }
        .link-text a:hover { color: var(--royal-dark); }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">🎮</div>
        <h1>GameApp</h1>
        <p>Sign in to play Snake &amp; use Calculator</p>
    </div>

    <!-- Error / Success Alerts -->
    <div th:if="${errorMsg}" class="alert alert-error">
        ⚠️ <span th:text="${errorMsg}"></span>
    </div>
    <div th:if="${successMsg}" class="alert alert-success">
        ✅ <span th:text="${successMsg}"></span>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input type="text" id="username" name="username"
                       placeholder="Enter your username"
                       autocomplete="username" required/>
            </div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" name="password"
                       placeholder="Enter your password"
                       autocomplete="current-password" required/>
            </div>
        </div>

        <button type="submit" class="btn-primary">Sign In →</button>
    </form>

    <div class="divider">or</div>

    <div class="link-text">
        Don't have an account? <a th:href="@{/register}">Create one</a>
    </div>
</div>
</body>
</html>
