# =============================================
# LOCAL DEVELOPMENT - MySQL Configuration
#
# Usage:
#   mvn spring-boot:run -Dspring.profiles.active=local-mysql
#   OR:
#   mvn package
#   java -jar target/gameapp-1.0.0.jar --spring.profiles.active=local-mysql
#
# Connection String:
#   jdbc:mysql://localhost:3306/gameapp_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#
# Before running:
#   CREATE DATABASE gameapp_db;  (or use createDatabaseIfNotExist=true)
# =============================================

spring.datasource.url=jdbc:mysql://localhost:3306/gameapp_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false
logging.level.com.gameapp=DEBUG
logging.level.org.springframework.security=DEBUG
