# =============================================
# LOCAL DEVELOPMENT - SQLite Configuration
#
# Usage:
#   mvn spring-boot:run -Dspring.profiles.active=local-sqlite
#   OR:
#   mvn package
#   java -jar target/gameapp-1.0.0.jar --spring.profiles.active=local-sqlite
#
# Connection String:
#   jdbc:sqlite:gameapp.db          (creates gameapp.db in current directory)
#   jdbc:sqlite:/path/to/gameapp.db (absolute path)
#
# No setup needed - SQLite creates the file automatically.
# =============================================

spring.datasource.url=jdbc:sqlite:gameapp.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Disable connection pooling for SQLite (it doesn't support concurrent writes well)
spring.datasource.hikari.maximum-pool-size=1

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

spring.thymeleaf.cache=false
logging.level.com.gameapp=DEBUG
logging.level.org.springframework.security=DEBUG
