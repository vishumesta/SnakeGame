<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GameApp — Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --royal-darkest: #0d1547;
            --royal-dark:    #1a237e;
            --royal-mid:     #283593;
            --royal-base:    #3949ab;
            --royal-light:   #5c6bc0;
            --royal-pale:    #9fa8da;
            --royal-bg:      #e8eaf6;
            --gold:          #ffd700;
            --white:         #ffffff;
        }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: var(--royal-bg);
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, var(--royal-darkest) 0%, var(--royal-dark) 60%, var(--royal-mid) 100%);
            padding: 0 32px;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 20px rgba(13,21,71,0.5);
        }
        .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .brand-icon { width:36px; height:36px; background:rgba(255,215,0,0.2); border:2px solid rgba(255,215,0,0.4); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; }
        .brand-name { font-size:20px; font-weight:800; color:var(--white); }
        .brand-name span { color:var(--gold); }
        .header-right { display:flex; align-items:center; gap:12px; }
        .back-btn { background:rgba(255,255,255,0.15); color:var(--white); border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:7px 14px; font-family:'Poppins',sans-serif; font-size:13px; font-weight:500; text-decoration:none; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
        .back-btn:hover { background:rgba(255,255,255,0.25); }
        .logout-btn { background:rgba(198,40,40,0.8); color:var(--white); border:none; border-radius:8px; padding:7px 14px; font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; display:flex; align-items:center; gap:5px; transition:all 0.2s; }
        .logout-btn:hover { background:#c62828; }

        .main { flex:1; display:flex; align-items:flex-start; justify-content:center; padding:40px 24px; gap:32px; flex-wrap:wrap; }

        /* Calculator */
        .calc-card {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 16px 50px rgba(26,35,126,0.18);
            overflow: hidden;
            width: 360px;
            flex-shrink: 0;
        }

        .calc-header {
            background: linear-gradient(135deg, var(--royal-dark), var(--royal-base));
            padding: 16px 20px 12px;
        }
        .calc-header-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .calc-expression {
            min-height: 24px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            text-align: right;
            word-break: break-all;
            font-weight: 400;
        }
        .calc-display {
            font-size: 46px;
            font-weight: 700;
            color: var(--white);
            text-align: right;
            padding: 4px 0 8px;
            word-break: break-all;
            min-height: 60px;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        /* Buttons grid */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #dde1f7;
        }

        .btn-calc {
            padding: 20px 10px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.12s ease;
            background: var(--white);
            color: var(--royal-dark);
        }
        .btn-calc:hover  { background: var(--royal-bg); }
        .btn-calc:active { transform: scale(0.93); background: #c5cae9; }

        .btn-op {
            background: #ede7f6;
            color: var(--royal-dark);
        }
        .btn-op:hover  { background: #d1c4e9; }

        .btn-equals {
            background: linear-gradient(135deg, var(--royal-dark), var(--royal-base));
            color: var(--white);
        }
        .btn-equals:hover  { background: linear-gradient(135deg, var(--royal-mid), var(--royal-light)); }
        .btn-equals:active { background: var(--royal-dark); }

        .btn-clear {
            background: #ffebee;
            color: #c62828;
        }
        .btn-clear:hover { background: #ffcdd2; }

        .btn-zero {
            grid-column: span 2;
        }

        .btn-sign { background: #e8f5e9; color: #2e7d32; }
        .btn-sign:hover { background: #c8e6c9; }
        .btn-pct  { background: #fff3e0; color: #e65100; }
        .btn-pct:hover  { background: #ffe0b2; }

        /* History Panel */
        .history-panel {
            width: 280px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 36px rgba(26,35,126,0.12);
            overflow: hidden;
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }
        .history-head {
            background: linear-gradient(135deg, var(--royal-mid), var(--royal-base));
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 700;
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn-clear-hist {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: var(--white);
            border-radius: 6px;
            padding: 4px 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-clear-hist:hover { background: rgba(255,255,255,0.25); }
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .history-empty { text-align:center; color:#9ca3af; font-size:13px; padding:24px 0; }
        .history-entry {
            border-bottom: 1px solid #f0f2fd;
            padding: 10px 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .history-entry:hover { background: var(--royal-bg); }
        .history-expr { font-size: 12px; color: #6b7280; }
        .history-result { font-size: 18px; font-weight: 700; color: var(--royal-dark); text-align: right; }

        /* Keyboard hint */
        .kb-card {
            width: 280px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(26,35,126,0.1);
            overflow: hidden;
        }
        .kb-head { background: linear-gradient(135deg, var(--royal-light), #7986cb); padding: 12px 18px; font-size: 13px; font-weight: 700; color: var(--white); }
        .kb-body { padding: 14px 18px; }
        .kb-item { display: flex; justify-content: space-between; font-size: 12.5px; color: #4b5563; padding: 6px 0; border-bottom: 1px solid #f0f2fd; }
        .kb-item:last-child { border-bottom: none; }
        .kbd { background: #f3f4fd; border: 1px solid #c5cae9; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 600; color: var(--royal-base); }

        @media (max-width: 700px) { .history-panel, .kb-card { display: none; } }
    </style>
</head>
<body>
<!-- Header -->
<header class="header">
    <a href="/dashboard" class="brand">
        <div class="brand-icon">🎮</div>
        <span class="brand-name">Game<span>App</span></span>
    </a>
    <div class="header-right">
        <a href="/dashboard" class="back-btn">← Dashboard</a>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="logout-btn">🚪 Logout</button>
        </form>
    </div>
</header>

<div class="main">

    <!-- Calculator -->
    <div class="calc-card">
        <div class="calc-header">
            <div class="calc-header-title">🧮 Calculator</div>
            <div class="calc-expression" id="expression"></div>
            <div class="calc-display"    id="display">0</div>
        </div>

        <div class="calc-grid">
            <!-- Row 1 -->
            <button class="btn-calc btn-clear"  onclick="clearAll()">C</button>
            <button class="btn-calc btn-sign"   onclick="toggleSign()">+/−</button>
            <button class="btn-calc btn-pct"    onclick="percent()">%</button>
            <button class="btn-calc btn-op"     onclick="setOperation('/')">÷</button>

            <!-- Row 2 -->
            <button class="btn-calc"            onclick="inputNum('7')">7</button>
            <button class="btn-calc"            onclick="inputNum('8')">8</button>
            <button class="btn-calc"            onclick="inputNum('9')">9</button>
            <button class="btn-calc btn-op"     onclick="setOperation('*')">×</button>

            <!-- Row 3 -->
            <button class="btn-calc"            onclick="inputNum('4')">4</button>
            <button class="btn-calc"            onclick="inputNum('5')">5</button>
            <button class="btn-calc"            onclick="inputNum('6')">6</button>
            <button class="btn-calc btn-op"     onclick="setOperation('-')">−</button>

            <!-- Row 4 -->
            <button class="btn-calc"            onclick="inputNum('1')">1</button>
            <button class="btn-calc"            onclick="inputNum('2')">2</button>
            <button class="btn-calc"            onclick="inputNum('3')">3</button>
            <button class="btn-calc btn-op"     onclick="setOperation('+')">+</button>

            <!-- Row 5 -->
            <button class="btn-calc btn-zero"   onclick="inputNum('0')">0</button>
            <button class="btn-calc"            onclick="inputDot()">.</button>
            <button class="btn-calc btn-equals" onclick="calculate()">=</button>
        </div>
    </div>

    <!-- Right column -->
    <div style="display:flex;flex-direction:column;gap:20px">
        <!-- History -->
        <div class="history-panel">
            <div class="history-head">
                📋 History
                <button class="btn-clear-hist" onclick="clearHistory()">Clear</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty" id="historyEmpty">No calculations yet</div>
            </div>
        </div>

        <!-- Keyboard hints -->
        <div class="kb-card">
            <div class="kb-head">⌨️ Keyboard Shortcuts</div>
            <div class="kb-body">
                <div class="kb-item">Numbers <span class="kbd">0</span>–<span class="kbd">9</span></div>
                <div class="kb-item">Add      <span class="kbd">+</span></div>
                <div class="kb-item">Subtract <span class="kbd">-</span></div>
                <div class="kb-item">Multiply <span class="kbd">*</span></div>
                <div class="kb-item">Divide   <span class="kbd">/</span></div>
                <div class="kb-item">Equals   <span class="kbd">Enter</span></div>
                <div class="kb-item">Decimal  <span class="kbd">.</span></div>
                <div class="kb-item">Clear    <span class="kbd">Esc</span></div>
                <div class="kb-item">Delete   <span class="kbd">Backspace</span></div>
            </div>
        </div>
    </div>

</div>

<script>
// ============================================================
//  CALCULATOR — Full Implementation
// ============================================================
let current   = '0';
let previous  = '';
let operator  = null;
let shouldReset = false;
let history   = [];

function updateDisplay() {
    const disp = document.getElementById('display');
    const expr = document.getElementById('expression');

    disp.textContent = formatNumber(current);
    // Shrink font if too long
    disp.style.fontSize = current.length > 12 ? '28px' : current.length > 9 ? '36px' : '46px';

    if (operator && previous !== '') {
        expr.textContent = formatNumber(previous) + ' ' + opSymbol(operator);
    } else {
        expr.textContent = '';
    }
}

function formatNumber(n) {
    if (n === '' || n === '-') return n;
    if (n.includes('Error') || n.includes('Infinity')) return n;
    // Keep decimal representation
    const num = parseFloat(n);
    if (isNaN(num)) return n;
    // If number has decimal point being typed, keep as-is
    if (n.endsWith('.')) return n;
    // Format with locale but avoid scientific notation for reasonable numbers
    if (Math.abs(num) < 1e12 && Math.abs(num) > 1e-6 || num === 0) {
        const parts = n.split('.');
        const intPart = parseInt(parts[0]).toLocaleString('en-US');
        return parts.length > 1 ? intPart + '.' + parts[1] : intPart;
    }
    return num.toPrecision(10).replace(/\.?0+$/, '');
}

function opSymbol(op) {
    return {'+':'+', '-':'−', '*':'×', '/':'÷'}[op] || op;
}

function inputNum(n) {
    if (shouldReset) { current = ''; shouldReset = false; }
    if (current === '0' && n !== '.') current = n;
    else if (current.length < 15) current += n;
    updateDisplay();
}

function inputDot() {
    if (shouldReset) { current = '0'; shouldReset = false; }
    if (!current.includes('.')) current += '.';
    updateDisplay();
}

function clearAll() {
    current = '0'; previous = ''; operator = null; shouldReset = false;
    updateDisplay();
}

function toggleSign() {
    if (current === '0') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
}

function percent() {
    const val = parseFloat(current);
    if (isNaN(val)) return;
    if (operator && previous !== '') {
        current = String(parseFloat(previous) * val / 100);
    } else {
        current = String(val / 100);
    }
    updateDisplay();
}

function setOperation(op) {
    if (operator && !shouldReset) {
        // Chain operations
        calculate(true);
    }
    previous  = current;
    operator  = op;
    shouldReset = true;
    updateDisplay();
}

function calculate(chain = false) {
    if (operator === null || previous === '') return;

    const a = parseFloat(previous);
    const b = parseFloat(current);
    let result;

    switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/':
            if (b === 0) { current = 'Error: ÷0'; operator = null; previous = ''; shouldReset = true; updateDisplay(); return; }
            result = a / b;
            break;
        default: return;
    }

    // Round to avoid floating point weirdness
    result = Math.round(result * 1e10) / 1e10;

    if (!chain) {
        // Add to history
        addHistory(previous, opSymbol(operator), current, String(result));
    }

    current     = String(result);
    previous    = '';
    if (!chain) operator = null;
    shouldReset = !chain;
    updateDisplay();
}

function addHistory(a, op, b, result) {
    history.unshift({ expr: `${formatNumber(a)} ${op} ${formatNumber(b)}`, result: formatNumber(result) });
    if (history.length > 20) history.pop();
    renderHistory();
}

function renderHistory() {
    const list  = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');
    if (history.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    // Rebuild
    const entries = list.querySelectorAll('.history-entry');
    entries.forEach(e => e.remove());

    history.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'history-entry';
        div.innerHTML = `<div class="history-expr">${item.expr} =</div><div class="history-result">${item.result}</div>`;
        div.onclick = () => {
            current = history[i].result.replace(/,/g,'');
            shouldReset = false;
            updateDisplay();
        };
        list.appendChild(div);
    });
}

function clearHistory() {
    history = [];
    document.getElementById('historyList').querySelectorAll('.history-entry').forEach(e => e.remove());
    document.getElementById('historyEmpty').style.display = 'block';
}

// Keyboard support
document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputNum(e.key);
    else if (e.key === '.')           inputDot();
    else if (e.key === '+')           setOperation('+');
    else if (e.key === '-')           setOperation('-');
    else if (e.key === '*')           setOperation('*');
    else if (e.key === '/')           { e.preventDefault(); setOperation('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape')      clearAll();
    else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        updateDisplay();
    }
    else if (e.key === '%') percent();
});

updateDisplay();
</script>
</body>
</html>
