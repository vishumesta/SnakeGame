# =============================================
# APPLICATION CONFIGURATION — H2 File Database (local, no server needed)
# Data is stored in ./data/gameapp.mv.db  (auto-created on first run)
# =============================================
spring.application.name=GameApp

server.port=8080

# =============================================
# H2 File-Based DataSource (persistent local database)
# =============================================
spring.datasource.url=jdbc:h2:file:./data/gameapp;AUTO_SERVER=TRUE;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console (accessible at http://localhost:8080/h2-console while app is running)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# Logging
logging.level.com.gameapp=INFO
logging.level.org.springframework.security=WARN
